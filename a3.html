<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignment 3: Connect the Shapes</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
    }
    #diagram-container {
      width: 100%;
      height: 100vh;
      background-color: #f4f4f4;
    }
  </style>
</head>
<body>

  <div id="diagram-container"></div>

  <script type="module">
    import Diagram from 'https://esm.sh/diagram-js@14.0.0';

    // --- Minimal Custom Renderer ---
    function CustomRenderer(eventBus) {
      // Render Rectangles (Shapes)
      eventBus.on('render.shape', function(event) {
        const gfx = event.gfx;
        const element = event.element;

        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('width', element.width);
        rect.setAttribute('height', element.height);
        rect.setAttribute('fill', 'white');
        rect.setAttribute('stroke', '#333');
        rect.setAttribute('stroke-width', '2');
        rect.setAttribute('rx', '4');

        gfx.appendChild(rect);
        return rect;
      });

      // NEW: Render Lines (Connections)
      eventBus.on('render.connection', function(event) {
        const gfx = event.gfx;
        const element = event.element;

        const polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
        
        // Map the waypoints array to a string format required by SVG: "x1,y1 x2,y2"
        const points = element.waypoints.map(w => `${w.x},${w.y}`).join(' ');
        
        polyline.setAttribute('points', points);
        polyline.setAttribute('fill', 'none');
        polyline.setAttribute('stroke', '#333');
        polyline.setAttribute('stroke-width', '2');

        gfx.appendChild(polyline);
        return polyline;
      });
    }
    CustomRenderer.$inject = [ 'eventBus' ];
    
    const customRenderModule = {
      __init__: [ 'customRenderer' ],
      customRenderer: [ 'type', CustomRenderer ]
    };
    // -------------------------------

    const diagram = new Diagram({
      canvas: {
        container: document.getElementById('diagram-container')
      },
      modules: [ customRenderModule ]
    });

    const canvas = diagram.get('canvas');
    const elementFactory = diagram.get('elementFactory');
    const elementRegistry = diagram.get('elementRegistry'); // Required for Assignment 3

    // 1. Set the root element
    const root = elementFactory.createRoot({ id: 'root' });
    canvas.setRootElement(root);

    // 2. Draw the three shapes (from Assignment 2)
    const shapeWidth = 120;
    const shapeHeight = 60;
    const startX = 150;
    const startY = 100;
    const gap = 40;

    for (let i = 0; i < 3; i++) {
      const shape = elementFactory.createShape({
        id: `shape${i + 1}`,
        x: startX + (i * (shapeWidth + gap)),
        y: startY,
        width: shapeWidth,
        height: shapeHeight
      });
      canvas.addShape(shape, root);
    }

    // 3. Retrieve shapes using the elementRegistry
    const shape1 = elementRegistry.get('shape1');
    const shape2 = elementRegistry.get('shape2');
    const shape3 = elementRegistry.get('shape3');

    // 4. Create and add Connection 1 (Shape 1 -> Shape 2)
    const connection1 = elementFactory.createConnection({
      id: 'connection1',
      source: shape1,
      target: shape2,
      waypoints: [
        { x: shape1.x + shape1.width, y: shape1.y + (shape1.height / 2) }, // Center-right of Shape 1
        { x: shape2.x, y: shape2.y + (shape2.height / 2) }                 // Center-left of Shape 2
      ]
    });
    canvas.addConnection(connection1, root);

    // 5. Create and add Connection 2 (Shape 2 -> Shape 3)
    const connection2 = elementFactory.createConnection({
      id: 'connection2',
      source: shape2,
      target: shape3,
      waypoints: [
        { x: shape2.x + shape2.width, y: shape2.y + (shape2.height / 2) }, // Center-right of Shape 2
        { x: shape3.x, y: shape3.y + (shape3.height / 2) }                 // Center-left of Shape 3
      ]
    });
    canvas.addConnection(connection2, root);

    console.log('Assignment 3: Shapes successfully connected!');
  </script>
</body>
</html>
