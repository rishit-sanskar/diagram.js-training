<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignment 2: Three Shapes</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
    }
    #diagram-container {
      width: 100%;
      height: 100vh;
      background-color: #f4f4f4;
    }
  </style>
</head>
<body>

  <div id="diagram-container"></div>

  <script type="module">
    import Diagram from 'https://esm.sh/diagram-js@14.0.0';

    // --- Minimal Custom Renderer ---
    function CustomRenderer(eventBus) {
      eventBus.on('render.shape', function(event) {
        const gfx = event.gfx;
        const element = event.element;

        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('width', element.width);
        rect.setAttribute('height', element.height);
        rect.setAttribute('fill', 'white');
        rect.setAttribute('stroke', '#333');
        rect.setAttribute('stroke-width', '2');
        rect.setAttribute('rx', '4');

        gfx.appendChild(rect);
        return rect;
      });
    }
    CustomRenderer.$inject = [ 'eventBus' ];
    
    const customRenderModule = {
      __init__: [ 'customRenderer' ],
      customRenderer: [ 'type', CustomRenderer ]
    };
    // -------------------------------

    const diagram = new Diagram({
      canvas: {
        container: document.getElementById('diagram-container')
      },
      modules: [ customRenderModule ]
    });

    const canvas = diagram.get('canvas');
    const elementFactory = diagram.get('elementFactory');

    // 1. Set the root element
    const root = elementFactory.createRoot({ id: 'root' });
    canvas.setRootElement(root);

    // 2. Define layout variables
    const shapeWidth = 120;
    const shapeHeight = 60;
    const startX = 150;
    const startY = 100;
    const gap = 40;
    const numberOfShapes = 3;

    // 3. Create and add the three shapes
    for (let i = 0; i < numberOfShapes; i++) {
      
      // Calculate the X position: Base X + (Current Index * (Width + Gap))
      // Shape 1 (i=0): 150 + (0 * 160) = 150
      // Shape 2 (i=1): 150 + (1 * 160) = 310
      // Shape 3 (i=2): 150 + (2 * 160) = 470
      const currentX = startX + (i * (shapeWidth + gap));

      const shape = elementFactory.createShape({
        id: `shape${i + 1}`, // Creates unique IDs: shape1, shape2, shape3
        x: currentX,
        y: startY,
        width: shapeWidth,
        height: shapeHeight
      });

      canvas.addShape(shape, root);
    }

    console.log('Assignment 2: Three shapes successfully rendered and evenly spaced!');
  </script>
</body>
</html>
