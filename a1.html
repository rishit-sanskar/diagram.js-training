<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignment 1: Hello Canvas</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
    }
    #diagram-container {
      width: 100%;
      height: 100vh;
      background-color: #f4f4f4; /* Light background to see the canvas */
    }
  </style>
</head>
<body>

  <div id="diagram-container"></div>

  <script type="module">
    import Diagram from 'https://esm.sh/diagram-js@14.0.0';

    // --- Minimal Custom Renderer ---
    // diagram-js handles logical shapes, but needs a renderer to draw actual pixels/SVG.
    function CustomRenderer(eventBus) {
      eventBus.on('render.shape', function(event) {
        const gfx = event.gfx; // The SVG group (<g>) for this shape
        const element = event.element;

        // Create standard SVG rectangle
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('width', element.width);
        rect.setAttribute('height', element.height);
        rect.setAttribute('fill', 'white');
        rect.setAttribute('stroke', '#333');
        rect.setAttribute('stroke-width', '2');
        rect.setAttribute('rx', '4'); // Slight rounded corners

        gfx.appendChild(rect);
        return rect;
      });
    }
    CustomRenderer.$inject = [ 'eventBus' ];
    
    const customRenderModule = {
      __init__: [ 'customRenderer' ],
      customRenderer: [ 'type', CustomRenderer ]
    };
    // -------------------------------

    // 2. Initialize the diagram with our container and custom rendering module
    const diagram = new Diagram({
      canvas: {
        container: document.getElementById('diagram-container')
      },
      modules: [ customRenderModule ]
    });

    // 3. Get the core services needed to build the diagram
    const canvas = diagram.get('canvas');
    const elementFactory = diagram.get('elementFactory');

    // 4. Set the root element (Applying your hint)
    const root = elementFactory.createRoot({ id: 'root' });
    canvas.setRootElement(root);

    // 5. Define and create the shape based on assignment parameters
    const shape = elementFactory.createShape({
      id: 'shape1',
      x: 150,
      y: 100,
      width: 120,
      height: 60
    });

    // 6. Add the shape to the canvas (attached to the root)
    canvas.addShape(shape, root);

    console.log('Assignment 1: Shape successfully rendered with no errors!');
  </script>
</body>
</html>
